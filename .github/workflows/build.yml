name: TypeScript Build

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  NEXT_PUBLIC_SITE_URL: 'http://localhost:2027'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
